{{ define "main" }}
<div class="page-header">
  <h1>Our Bucks</h1>
</div>
<div class="section">
  <div class="card-grid">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="card" style="text-decoration:none;color:inherit;">
      {{ with .Params.image }}<img src="{{ . | relURL }}" alt="{{ $.Title }}" style="width:100%;height:200px;object-fit:cover;border-radius:8px;">{{ else }}<div class="placeholder-img">📷 Photo coming soon</div>{{ end }}
      <h3>{{ .Title }}</h3>
      <span class="registered-name">{{ .Params.registered_name }}</span>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
