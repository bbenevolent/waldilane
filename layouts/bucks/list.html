{{ define "main" }}
<div class="page-header">
  <h1>Our Bucks</h1>
</div>
<div class="section">
  <div class="card-grid">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="card" style="text-decoration:none;color:inherit;">
      <div class="placeholder-img">📷 Photo coming soon</div>
      <h3>{{ .Title }}</h3>
      <span class="registered-name">{{ .Params.registered_name }}</span>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
