{{ define "main" }}
<div class="page-header">
  <h1>{{ .Title }}</h1>
</div>
<div class="page-content">
  <div class="blog-meta">{{ dateFormat "January 2, 2006" .Date }} · {{ .Params.author }}</div>
  {{ .Content }}
  <p style="margin-top:2rem;"><a href="{{ "blog/" | relURL }}">← Back to Blog</a></p>
</div>
{{ end }}
