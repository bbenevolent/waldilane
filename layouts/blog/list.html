{{ define "main" }}
<div class="page-header">
  <h1>Blog</h1>
</div>
<div class="section">
  {{ range .Pages }}
  <div class="card" style="margin-bottom:1.5rem;">
    <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
    <div class="blog-meta">{{ dateFormat "January 2, 2006" .Date }} · {{ .Params.author }}</div>
    <p>{{ .Summary }}</p>
  </div>
  {{ end }}
</div>
{{ end }}
